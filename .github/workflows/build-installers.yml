name: build-installer

# Builds the self-contained Windows installer (mst-ru-setup.exe): a PyInstaller one-folder
# bundle wrapped by Inno Setup. Nothing — no Python, no .NET, no libraries — needs to be
# installed on the target Windows 10/11 machine. The game's assets are not in the build: the
# patch is built on the player's machine from their own copy of the game.
#
# Every run rebuilds the exe and (re)publishes a SINGLE rolling "latest" release, named with the
# build date — so GitHub Releases always shows exactly one, current, dated download.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip UnityPy numpy Pillow pyinstaller

      - name: Build date
        id: meta
        shell: bash
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build the one-folder bundle (PyInstaller)
        run: pyinstaller --noconfirm packaging/mst-ru.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build the installer (Inno Setup, build date embedded)
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyBuildDate=${{ steps.meta.outputs.date }} packaging\mst-ru.iss'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mst-ru-setup
          path: dist/mst-ru-setup.exe

      - name: Publish the single rolling "latest" release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          date="${{ steps.meta.outputs.date }}"
          title="Metal Slug Tactics — русификатор · $date"
          notes="Автономный установщик под Windows. Дата сборки: **$date**.

          Скачай \`mst-ru-setup.exe\`, закрой игру и запусти — ничего доустанавливать не нужно.
          Подробности в [README](https://github.com/superheher/metal-slug-tactics-ru#readme)."
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest --title "$title" --notes "$notes" --target "$GITHUB_SHA" --latest
            gh release upload latest dist/mst-ru-setup.exe --clobber
          else
            gh release create latest dist/mst-ru-setup.exe --title "$title" --notes "$notes" --target "$GITHUB_SHA" --latest
          fi
