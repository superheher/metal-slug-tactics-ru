name: build-installer

# Builds the single self-contained Windows patcher (mst-ru-setup.exe) with PyInstaller
# (onefile). Double-clicking it unpacks to a temp folder, patches the game from the player's
# own copy, and cleans up — nothing is installed. The game's assets are not in the build.
#
# Every push to main rebuilds it and updates one rolling "latest" release, named with the build date.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip UnityPy numpy Pillow pyinstaller

      - name: Build date
        id: meta
        shell: bash
        run: |
          d=$(date -u +%Y-%m-%d)
          echo "$d" > build_date.txt
          echo "date=$d" >> "$GITHUB_OUTPUT"

      - name: Build the single-file exe (PyInstaller)
        run: pyinstaller --noconfirm packaging/mst-ru.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mst-ru-setup
          path: dist/mst-ru-setup.exe

      - name: Publish the single rolling "latest" release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          date="${{ steps.meta.outputs.date }}"
          title="Metal Slug Tactics RU · $date"
          notes="Автономный русификатор Metal Slug Tactics под Windows. Дата сборки: **$date**.

          Скачайте \`mst-ru-setup.exe\` и запустите."
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest --title "$title" --notes "$notes" --target "$GITHUB_SHA" --latest
            gh release upload latest dist/mst-ru-setup.exe --clobber
          else
            gh release create latest dist/mst-ru-setup.exe --title "$title" --notes "$notes" --target "$GITHUB_SHA" --latest
          fi
